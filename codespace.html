<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senternet Code Space | Powered by Senternet Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://rebrand.ly/senternet" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* Intro Animation Styles */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }

        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
        }

        .logo-circle {
            position: absolute;
            inset: 0;
            border: 4px solid transparent;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .logo-image {
            position: absolute;
            inset: 10px;
            background-image: url('https://www.jotform.com/uploads/senternettechnologies/agent_files/avatar_images/1000009224-6944f3cfaee596.07540393.webp');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            border: 2px solid #334155;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .text-reveal {
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #38bdf8;
            width: 0;
            animation: typing 1.5s steps(30, end) forwards, blink 0.5s step-end infinite alternate;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }

        .fade-out {
            transform: translateY(-100%) !important;
        }

        /* Iframe Styles */
        .iframe-container {
            width: 100vw;
            height: 100vh;
            background: white;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        /* Mobile Controls */
        .floating-action {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #38bdf8;
            color: white;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .floating-action:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <!-- Intro Animation Screen -->
    <div id="intro-overlay">
        <div class="logo-container">
            <div class="logo-circle"></div>
            <div class="logo-image"></div>
        </div>
        <div class="text-group text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold text-white mb-2">
                <span class="text-reveal">SENTERNATE CODE SPACE</span>
            </h1>
            <p id="sub-text" class="text-slate-400 text-sm md:text-base opacity-0 transition-opacity duration-1000">
                Initializing Secure Developer Environment...
            </p>
        </div>
        
        <div class="mt-12 text-center text-xs text-slate-500 uppercase tracking-widest">
            SENTERNET TECHNOLOGIES • ARANTHANGI
        </div>
    </div>

    <!-- Main App Content -->
    <main class="iframe-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwWY8OBebK6UZumTP98aO9sc6f934kCuSS4vNCg7DD6D4SKGpOW0Kcx4-3lHESHLauzaw/exec" 
            title="Senternet Code Space"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
        </iframe>
    </main>

    <!-- Floating Home/Contact Button -->
    <a href="https://rebrand.ly/senternet" target="_blank" class="floating-action" title="Visit Official Site">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>

    <script>
        window.addEventListener('load', () => {
            const overlay = document.getElementById('intro-overlay');
            const subText = document.getElementById('sub-text');

            // Step 1: Show subtext after typing animation
            setTimeout(() => {
                subText.classList.remove('opacity-0');
            }, 1000);

            // Step 2: Remove overlay and reveal iframe
            setTimeout(() => {
                overlay.classList.add('fade-out');
            }, 3000);

            // Cleanup: remove overlay from DOM after transition
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 4000);
        });

        // Error Handling for Iframe
        window.onerror = function() {
            console.log("Error loading workspace resources. Check connection.");
        };
    </script>
</body>
</html>
