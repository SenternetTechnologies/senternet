<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senternet Code Space | Official</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://rebrand.ly/senternet" type="image/x-icon">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevent body scroll */
            background-color: #0f172a; /* Slate-900 */
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Container to hold the iframe and footer */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Iframe takes up all available space */
        .iframe-wrapper {
            flex-grow: 1;
            position: relative;
            width: 100%;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }

        /* Minimal Header/Footer for Brand Identity */
        .brand-bar {
            background: #1e293b; /* Slate-800 */
            color: #f8fafc;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            z-index: 50;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
        }

        .visit-btn {
            background: #0ea5e9;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
        }

        .visit-btn:hover {
            background: #0284c7;
        }

        /* Error state fallback */
        #error-msg {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f172a;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Top Branding Bar -->
        <header class="brand-bar">
            <div class="logo-section">
                <img src="https://www.jotform.com/uploads/senternettechnologies/agent_files/avatar_images/1000009224-6944f3cfaee596.07540393.webp" alt="Senthilkumar CEO" class="logo-img">
                <span class="text-sm font-bold tracking-tight">SENTERNET CODE SPACE</span>
            </div>
            <a href="https://rebrand.ly/senternet" target="_blank" class="visit-btn">Visit Website</a>
        </header>

        <!-- Main Workspace -->
        <div class="iframe-wrapper">
            <iframe 
                id="content-frame"
                src="https://script.google.com/macros/s/AKfycbwWY8OBebK6UZumTP98aO9sc6f934kCuSS4vNCg7DD6D4SKGpOW0Kcx4-3lHESHLauzaw/exec" 
                title="Senternet Workspace"
                allow="clipboard-write; encrypted-media; web-share"
                loading="eager">
            </iframe>
        </div>
    </div>

    <!-- Error Message (Hidden by default) -->
    <div id="error-msg">
        <h2 class="text-xl font-bold mb-2">Connection Issue</h2>
        <p class="text-slate-400 mb-4">Unable to load the code space. Please check your internet or try refreshing.</p>
        <button onclick="location.reload()" class="bg-slate-700 px-6 py-2 rounded-lg">Refresh Now</button>
    </div>

    <script>
        // Simple script to handle iframe heartbeats or load issues if necessary
        const iframe = document.getElementById('content-frame');
        
        // Timeout check: If iframe doesn't load in 15 seconds, show friendly message
        const loadTimeout = setTimeout(() => {
            try {
                if (!iframe.contentWindow || iframe.contentWindow.length === 0) {
                    // This is a rough check, as cross-origin might block some detection
                    // but it gives a hint if things are totally broken
                }
            } catch (e) {
                // If we hit CORS error, the iframe likely loaded something, so we're good
            }
        }, 15000);

        iframe.onload = () => {
            clearTimeout(loadTimeout);
            console.log("Senternet Code Space Loaded Successfully.");
        };

        // Standard error safety
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'IFRAME') {
                document.getElementById('error-msg').style.display = 'flex';
            }
        }, true);
    </script>
</body>
</html>
