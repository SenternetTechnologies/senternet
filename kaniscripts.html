<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaniscripts | Powered by Senternet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        /* Fullscreen iFrame Styling */
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* Splash Screen Overlay */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .logo-animation {
            width: 200px;
            max-width: 60%;
            height: auto;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Loader Bar */
        .loader-container {
            width: 200px;
            height: 4px;
            background-color: #f3f3f3;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            transition: width 5s linear;
        }

        /* Hidden Class */
        .fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <!-- Splash Screen (Intro) -->
    <div id="splash-screen">
        <img src="https://i.ibb.co/Y7gnNM31/Screenshot-20260327-152119.jpg" 
             alt="Kaniscripts Logo" 
             class="logo-animation"
             onerror="this.src='https://via.placeholder.com/200?text=Kaniscripts'">
        
        <div class="loader-container">
            <div id="loader-fill" class="loader-fill"></div>
        </div>
        <p class="mt-4 text-gray-400 text-sm font-medium tracking-widest uppercase">Initializing...</p>
    </div>

    <!-- Main Web App iFrame -->
    <iframe 
        id="webapp-frame"
        src="https://script.google.com/macros/s/AKfycbwseP_kvxWHGcMnkxs2StK4iYv0kFtmk20SH2vlkzDRBlXLgH3Jb8niCXJjqWBRjhHjUw/exec" 
        class="app-container"
        allow="geolocation; microphone; camera; midi; encrypted-media;"
        title="Kaniscripts Application">
    </iframe>

    <script>
        window.onload = function() {
            const splash = document.getElementById('splash-screen');
            const loader = document.getElementById('loader-fill');

            // Start the loader animation immediately
            setTimeout(() => {
                loader.style.width = '100%';
            }, 100);

            // Hide the splash screen after 5 seconds
            setTimeout(() => {
                splash.classList.add('fade-out');
                
                // Remove from DOM after transition to prevent interaction issues
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }, 5000);
        };
    </script>
</body>
</html>
