<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senternet Technologies | Ads Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .violet-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
        }

        .text-violet-custom {
            color: #7c3aed;
        }

        /* Intro Animation Overlay */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Glassmorphism Sidebar */
        .sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(124, 58, 237, 0.1);
            transition: all 0.3s ease;
        }

        /* Iframe Container */
        .app-container {
            height: calc(100vh - 64px);
            width: 100%;
            border: none;
            background: #f9fafb;
        }

        .nav-item {
            transition: all 0.2s;
        }

        .nav-item:hover {
            background-color: rgba(124, 58, 237, 0.05);
            color: #7c3aed;
        }

        .nav-active {
            background-color: rgba(124, 58, 237, 0.1);
            color: #7c3aed;
            border-right: 4px solid #7c3aed;
        }

        /* Smooth Fade In */
        .fade-in {
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Intro Overlay -->
    <div id="intro-overlay">
        <div class="mb-6">
            <img src="https://www.jotform.com/uploads/senternettechnologies/agent_files/avatar_images/1000009224-6944f3cfaee596.07540393.webp" 
                 alt="Senternet Logo" 
                 class="w-24 h-24 rounded-full border-4 border-purple-100 shadow-xl object-cover mb-4">
        </div>
        <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Senternet Technologies</h1>
        <p class="text-violet-custom font-semibold">Ads Manager Webapp</p>
        <div class="mt-8 loader-ring"></div>
    </div>

    <div class="flex h-screen overflow-hidden">
        
        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col min-w-0">
            
            <!-- Header -->
            <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-6 z-10 shadow-sm">
                <div class="flex items-center gap-3">
                    <span class="p-2 bg-purple-600 rounded-lg text-white">
                        <i class="fas fa-chart-line"></i>
                    </span>
                    <h2 class="text-xl font-bold text-gray-800 hidden md:block">Ads Manager <span class="text-purple-600">Pro</span></h2>
                </div>

                <div class="flex items-center gap-4">
                    <a href="https://rebrand.ly/senternet" target="_blank" class="text-sm font-medium text-gray-500 hover:text-purple-600 transition-colors">Official Site</a>
                    <div class="h-8 w-px bg-gray-200"></div>
                    <div class="flex items-center gap-2 cursor-pointer group">
                        <div class="text-right hidden sm:block">
                            <p class="text-xs font-bold text-gray-800 group-hover:text-purple-600">Senthilkumar</p>
                            <p class="text-[10px] text-gray-400">Owner & CEO</p>
                        </div>
                        <img src="https://www.jotform.com/uploads/senternettechnologies/agent_files/avatar_images/1000009224-6944f3cfaee596.07540393.webp" 
                             alt="User Profile" 
                             class="w-10 h-10 rounded-full border-2 border-purple-200 object-cover shadow-sm">
                    </div>
                </div>
            </header>

            <!-- Iframe Application Area -->
            <main class="flex-1 relative bg-gray-100">
                <div id="iframe-loading" class="absolute inset-0 flex items-center justify-center bg-gray-50 z-0">
                    <div class="text-center">
                        <div class="inline-block animate-bounce text-purple-600 mb-2">
                            <i class="fas fa-cloud-download-alt fa-2x"></i>
                        </div>
                        <p class="text-sm text-gray-500">Syncing with Ads Engine...</p>
                    </div>
                </div>
                <!-- The App Script Iframe -->
                <iframe 
                    id="app-iframe"
                    src="https://script.google.com/macros/s/AKfycbzgqrW2IP8-JveQYXSbo-l9YSgyXHWmC8f1glu7SRgd2MD8NOUcX7WzNYpL6Uj8ojvD/exec" 
                    class="app-container relative z-10"
                    allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; usb"
                    style="width: 100%; height: 100%;"
                    onload="document.getElementById('iframe-loading').style.display='none';"
                ></iframe>
            </main>

            <!-- Mini Footer / Status Bar -->
            <footer class="h-8 bg-white border-t border-gray-100 px-4 flex items-center justify-between text-[10px] text-gray-400 uppercase tracking-widest font-bold">
                <div>&copy; SENTERNET TECHNOLOGIES | ARANTHANGI</div>
                <div class="flex gap-4">
                    <span><i class="fas fa-circle text-green-500 text-[6px] mr-1"></i> System Active</span>
                    <span class="hidden sm:inline">Support: +91 81900 38085</span>
                </div>
            </footer>
        </div>
    </div>

    <script>
        // Intro Screen logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const overlay = document.getElementById('intro-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.visibility = 'hidden';
                }, 800);
            }, 2500); // 2.5 seconds show-off time
        });

        // Error handling for iframe (Google Scripts can sometimes block framing)
        window.addEventListener('message', function(e) {
            // Placeholder for communication if needed
        }, false);
    </script>
</body>
</html>
