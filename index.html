<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senternet Technologies | Aranthangi</title>
    
    <meta name="title" content="Senternet Technologies | Cinematic Digital Hub">
    <meta name="description" content="Leading the digital revolution in Aranthangi. Web Design, Apps, and Marketing.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/webp" href="https://www.jotform.com/uploads/senternettechnologies/agent_files/avatar_images/1000009224-6944f3cfaee596.07540393.webp">

    <style>
        :root {
            --accent: #3b82f6;
            --deep-indigo: #0f172a;
            --slate: #1e293b;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* --- CINEMATIC INTRO STYLES --- */
        #intro-container {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            perspective: 1000px;
        }

        /* Map Background Simulation */
        #map-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(37, 99, 235, 0.1) 0%, #000 70%);
            z-index: 1;
        }

        #satellite-map {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=2000') center center / cover;
            filter: brightness(0.4) saturate(1.2);
            transform: scale(1);
            transition: transform 5s cubic-bezier(0.85, 0, 0.15, 1);
            z-index: 0;
        }

        .map-zoomed {
            transform: scale(15) !important;
            filter: brightness(1) blur(10px) !important;
        }

        /* Tech Connection Overlay */
        #tech-nodes {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .node-label {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
            transform: scale(0);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }

        .node-active {
            transform: scale(1);
            opacity: 1;
        }

        /* Center Piece */
        #center-brand {
            z-index: 10;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
        }

        .ceo-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 5px;
            background: #fff;
            margin: 0 auto 20px;
            box-shadow: 0 0 50px rgba(37, 99, 235, 0.6);
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
            to { box-shadow: 0 0 60px rgba(37, 99, 235, 0.8); }
        }

        /* --- MAIN APP CONTAINER --- */
        #app-wrapper {
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .transition-flash {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 20000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #status-bar {
            position: absolute;
            bottom: 40px;
            width: 200px;
            left: 50%;
            transform: translateX(-50%);
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            z-index: 11;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="intro-container">
        <div id="satellite-map"></div>
        <div id="map-overlay"></div>
        
        <canvas id="connections-canvas" style="position: absolute; inset:0; z-index: 5;"></canvas>

        <div id="tech-nodes">
            <!-- Team & Project Nodes (Generated by JS) -->
        </div>

        <div id="center-brand">
            <img src="https://www.jotform.com/uploads/senternettechnologies/agent_files/avatar_images/1000009224-6944f3cfaee596.07540393.webp" alt="Senthilkumar CEO" class="ceo-avatar">
            <h1 class="text-4xl font-black tracking-tighter mb-1">SENTERNET</h1>
            <p class="text-xs tracking-[0.6em] text-blue-400 font-bold">TECHNOLOGIES</p>
            <p id="location-tag" class="text-[10px] text-slate-400 mt-4 font-medium italic">Aranthangi, Pudukkottai</p>
        </div>

        <div id="status-bar">
            <div id="progress"></div>
        </div>
    </div>

    <div class="transition-flash" id="flash"></div>

    <div id="app-wrapper">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwB9aFIBRR1Hdr1YwPfQspjNPd32zSDra80EXg70X2zfX1aNZN3vsFwIIB4RV3_gpWaAw/exec" 
            allow="geolocation; microphone; camera; clipboard-write; self">
        </iframe>
    </div>

    <script>
        const nodesData = [
            { label: "Senthilkumar (CEO)", x: 20, y: 30 },
            { label: "Web Design (Kumar)", x: 80, y: 25 },
            { label: "Backend (Sathish)", x: 15, y: 70 },
            { label: "Marketing (Haritha)", x: 85, y: 75 },
            { label: "Engineering (Arun)", x: 50, y: 15 },
            { label: "Graphics (Sevu)", x: 45, y: 85 }
        ];

        const canvas = document.getElementById('connections-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        function createNodes() {
            const container = document.getElementById('tech-nodes');
            nodesData.forEach((node, i) => {
                const div = document.createElement('div');
                div.className = 'node-label';
                div.innerText = node.label;
                div.style.left = node.x + '%';
                div.style.top = node.y + '%';
                div.id = `node-${i}`;
                container.appendChild(div);
            });
        }

        function drawLines(activeIndices) {
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)';
            ctx.lineWidth = 1;
            
            const centerX = width / 2;
            const centerY = height / 2;

            activeIndices.forEach(idx => {
                const node = nodesData[idx];
                const targetX = (node.x / 100) * width;
                const targetY = (node.y / 100) * height;
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(targetX, targetY);
            });
            ctx.stroke();
        }

        async function startSequence() {
            createNodes();
            
            const progressBar = document.getElementById('progress');
            const map = document.getElementById('satellite-map');
            const centerBrand = document.getElementById('center-brand');
            const flash = document.getElementById('flash');
            const app = document.getElementById('app-wrapper');
            const intro = document.getElementById('intro-container');

            // 1. Initial Fade In
            setTimeout(() => {
                centerBrand.style.opacity = '1';
                centerBrand.style.transform = 'translateY(0)';
            }, 500);

            // 2. Connect Nodes One by One
            for (let i = 0; i < nodesData.length; i++) {
                await new Promise(r => setTimeout(r, 400));
                document.getElementById(`node-${i}`).classList.add('node-active');
                drawLines([...Array(i + 1).keys()]);
                progressBar.style.width = ((i + 1) / nodesData.length * 60) + '%';
            }

            // 3. Zoom into Aranthangi
            setTimeout(() => {
                map.classList.add('map-zoomed');
                progressBar.style.width = '90%';
                document.getElementById('location-tag').classList.add('scale-150', 'text-white', 'not-italic');
                document.getElementById('location-tag').innerText = "TARGET: ARANTHANGI HUB";
            }, 1000);

            // 4. Final Blast Through
            setTimeout(() => {
                progressBar.style.width = '100%';
                flash.style.opacity = '1';
                
                setTimeout(() => {
                    intro.style.display = 'none';
                    app.style.display = 'block';
                    setTimeout(() => {
                        app.style.opacity = '1';
                        app.style.transform = 'scale(1)';
                        flash.style.opacity = '0';
                    }, 50);
                }, 400);
            }, 3500);
        }

        window.onload = startSequence;

        // Prevent navigation away
        history.pushState(null, null, location.href);
        window.onpopstate = () => history.go(1);
    </script>
</body>
</html>
