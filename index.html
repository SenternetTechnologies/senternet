<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Resource Hints for Faster Connection -->
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">
    <link rel="dns-prefetch" href="https://script.google.com">
    
    <!-- Senternet Official Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id=%22g%22 x1=%220%%22 y1=%220%%22 x2=%22100%%22 y2=%22100%%22><stop offset=%220%%22 style=%22stop-color:%2300f2fe;stop-opacity:1%22 /><stop offset=%22100%%22 style=%22stop-color:%234facfe;stop-opacity:1%22 /></linearGradient></defs><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22url(%23g)%22/><text y=%22.9em%22 x=%2250%%22 font-size=%2270%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22Arial, sans-serif%22 font-weight=%22bold%22>S</text></svg>">
    <link rel="alternate icon" type="image/png" href="https://www.jotform.com/uploads/senternettechnologies/agent_files/avatar_images/1000009224-6944f3cfaee596.07540393.webp">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTERNET TECHNOLOGIES | Expert Web Design & Digital Marketing in Aranthangi</title>
    
    <!-- SEO & Meta Tags -->
    <meta name="description" content="SENTERNET TECHNOLOGIES offers professional web design, UI/UX development, and digital marketing services in Aranthangi. Transform your business with Senthilkumar (CEO).">
    <meta property="og:image" content="https://www.jotform.com/uploads/senternettechnologies/agent_files/avatar_images/1000009224-6944f3cfaee596.07540393.webp">
    <meta name="theme-color" content="#7F00FF">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --vibrant-green: #00f2fe;
            --azure: #4facfe;
            --bg-bright: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg-bright);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- STAGE LAYOUT --- */
        #intro-stage {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease;
        }

        .mesh-bg {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(at 0% 0%, hsla(197, 100%, 82%, 0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(160, 100%, 84%, 0.3) 0, transparent 50%);
            z-index: 1;
        }

        #fx-canvas { position: absolute; inset: 0; z-index: 2; }
        .content-container { position: relative; z-index: 10; text-align: center; }

        .logo-sphere {
            width: 140px; height: 140px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 2rem;
            box-shadow: 0 25px 50px -12px rgba(79, 172, 254, 0.3);
            animation: morph 8s ease-in-out infinite;
            opacity: 0; transform: scale(0.5);
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes morph {
            0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            50% { border-radius: 60% 40% 30% 70% / 50% 60% 40% 60%; }
        }

        .logo-sphere.active { opacity: 1; transform: scale(1); }

        .brand-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem; font-weight: 900;
            background: linear-gradient(to right, #2563eb, #0ea5e9, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0; transform: translateY(30px);
            transition: all 1s ease 0.5s;
        }

        .brand-text.active { opacity: 1; transform: translateY(0); }

        .tagline {
            font-size: 0.9rem; color: #64748b;
            letter-spacing: 0.5em; text-transform: uppercase;
            font-weight: 600; margin-top: 1rem;
            opacity: 0; transition: all 1.2s ease 1s;
        }

        .tagline.active { opacity: 1; letter-spacing: 0.8em; }

        .status-box { margin-top: 4rem; width: 250px; opacity: 0; transition: opacity 1s ease 1.5s; }
        .status-box.active { opacity: 1; }

        .progress-bar { height: 4px; width: 100%; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(to right, var(--azure), var(--vibrant-green));
            box-shadow: 0 0 10px var(--azure);
            transition: width 0.4s ease; /* Fast transition for smooth updates */
        }

        #main-app { position: fixed; inset: 0; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }
        .loading-text { font-size: 10px; color: #94a3b8; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro-stage">
        <div class="mesh-bg"></div>
        <canvas id="fx-canvas"></canvas>

        <div class="content-container">
            <div class="logo-sphere" id="sphere">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <h1 class="brand-text" id="title">SENTERNET</h1>
            <p class="tagline" id="tagline">Technologies</p>

            <div class="status-box mx-auto" id="status-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="fill"></div>
                </div>
                <p class="loading-text" id="status-msg">Initializing App Core...</p>
            </div>
        </div>
    </div>

    <div id="main-app">
        <!-- Added loading="eager" for priority rendering -->
        <iframe 
            id="appFrame"
            src="https://script.google.com/macros/s/AKfycbwB9aFIBRR1Hdr1YwPfQspjNPd32zSDra80EXg70X2zfX1aNZN3vsFwIIB4RV3_gpWaAw/exec" 
            loading="eager"
            allow="geolocation; microphone; camera; clipboard-write">
        </iframe>
    </div>

    <script>
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Spark {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.alpha = Math.random() * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(79, 172, 254, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0,0,width,height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        async function runIntroSequence() {
            const sphere = document.getElementById('sphere');
            const title = document.getElementById('title');
            const tagline = document.getElementById('tagline');
            const status = document.getElementById('status-container');
            const fill = document.getElementById('fill');
            const msg = document.getElementById('status-msg');
            const stage = document.getElementById('intro-stage');
            const frame = document.getElementById('appFrame');

            // Start UI Reveal
            setTimeout(() => sphere.classList.add('active'), 200);
            setTimeout(() => title.classList.add('active'), 600);
            setTimeout(() => tagline.classList.add('active'), 1000);
            setTimeout(() => status.classList.add('active'), 1400);

            let progress = 0;
            const msgs = [
                "Establishing secure connection...",
                "Waking up the digital engine...",
                "Optimizing assets for you...",
                "Senternet Hub Ready."
            ];

            // Smart Progress Logic
            const progressInterval = setInterval(() => {
                if (progress < 90) { // Stay at 90% until iframe actually loads
                    progress += (90 - progress) * 0.05; 
                    fill.style.width = progress + '%';
                    
                    if (progress > 20) msg.innerText = msgs[0];
                    if (progress > 50) msg.innerText = msgs[1];
                    if (progress > 75) msg.innerText = msgs[2];
                }
            }, 200);

            // The Secret Sauce: Detect when iframe is actually interactive
            frame.onload = () => {
                clearInterval(progressInterval);
                fill.style.width = '100%';
                msg.innerText = msgs[3];

                setTimeout(() => {
                    stage.style.transform = 'translateY(-100%)';
                    stage.style.opacity = '0';
                    setTimeout(() => stage.remove(), 1200);
                }, 800); // Exit immediately after load
            };
            
            // Safety timeout: If iframe takes too long (> 15s), exit anyway
            setTimeout(() => {
                if(document.getElementById('intro-stage')) {
                     stage.style.transform = 'translateY(-100%)';
                     setTimeout(() => stage.remove(), 1200);
                }
            }, 15000);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        for(let i=0; i<40; i++) particles.push(new Spark());
        animate();
        runIntroSequence();
    </script>
</body>
</html>
