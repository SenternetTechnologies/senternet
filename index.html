    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --vibrant-green: #00f2fe;
            --azure: #4facfe;
            --bg-bright: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg-bright);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- STAGE LAYOUT --- */
        #intro-stage {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease;
        }

        /* Animated Mesh Background */
        .mesh-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(197, 100%, 82%, 0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(160, 100%, 84%, 0.3) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(201, 100%, 85%, 0.3) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(180, 100%, 80%, 0.3) 0, transparent 50%);
            z-index: 1;
        }

        #fx-canvas {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .content-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* --- LOGO GLASS EFFECT --- */
        .logo-sphere {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 2rem;
            box-shadow: 0 25px 50px -12px rgba(79, 172, 254, 0.3);
            animation: morph 8s ease-in-out infinite;
            opacity: 0;
            transform: scale(0.5);
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            50% { border-radius: 60% 40% 30% 70% / 50% 60% 40% 60%; }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        }

        .logo-sphere.active {
            opacity: 1;
            transform: scale(1);
        }

        /* --- TYPOGRAPHY --- */
        .brand-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(to right, #2563eb, #0ea5e9, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease 0.5s;
        }

        .brand-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        .tagline {
            font-size: 0.9rem;
            color: #64748b;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 1rem;
            opacity: 0;
            transition: all 1.2s ease 1s;
        }

        .tagline.active {
            opacity: 1;
            letter-spacing: 0.8em;
        }

        /* --- PROGRESS UI --- */
        .status-box {
            margin-top: 4rem;
            width: 250px;
            opacity: 0;
            transition: opacity 1s ease 1.5s;
        }

        .status-box.active { opacity: 1; }

        .progress-bar {
            height: 4px;
            width: 100%;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--azure), var(--vibrant-green));
            box-shadow: 0 0 10px var(--azure);
            transition: width 10s linear; /* Forced 10s duration */
        }

        /* --- APP WRAPPER (Iframe hidden behind) --- */
        #main-app {
            position: fixed;
            inset: 0;
            z-index: 1;
            /* No display:none, just keep it behind the intro */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-text {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>

<body>

    <div id="intro-stage">
        <div class="mesh-bg"></div>
        <canvas id="fx-canvas"></canvas>

        <div class="content-container">
            <!-- Glass Logo Node -->
            <div class="logo-sphere" id="sphere">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <!-- Brand Identity -->
            <h1 class="brand-text" id="title">SENTERNET</h1>
            <p class="tagline" id="tagline">Technologies</p>

            <!-- Preloader Status -->
            <div class="status-box mx-auto" id="status-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="fill"></div>
                </div>
                <p class="loading-text" id="status-msg">Initializing App Core...</p>
            </div>
        </div>
    </div>

    <!-- MAIN APP WRAPPER (Always active in background) -->
    <div id="main-app">
        <iframe src="https://script.google.com/macros/s/AKfycbwB9aFIBRR1Hdr1YwPfQspjNPd32zSDra80EXg70X2zfX1aNZN3vsFwIIB4RV3_gpWaAw/exec"></iframe>
    </div>

    <script>
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Spark {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.alpha = Math.random();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(79, 172, 254, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0,0,width,height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        async function runIntroSequence() {
            const sphere = document.getElementById('sphere');
            const title = document.getElementById('title');
            const tagline = document.getElementById('tagline');
            const status = document.getElementById('status-container');
            const fill = document.getElementById('fill');
            const msg = document.getElementById('status-msg');
            const stage = document.getElementById('intro-stage');

            // 1. Reveal Elements
            setTimeout(() => sphere.classList.add('active'), 300);
            setTimeout(() => title.classList.add('active'), 800);
            setTimeout(() => tagline.classList.add('active'), 1300);
            setTimeout(() => status.classList.add('active'), 1800);

            // 2. Controlled 10-Second Progress
            fill.style.width = '100%';

            const msgs = [
                "Establishing secure connection...",
                "Waking up the digital engine...",
                "Optimizing assets for you...",
                "Almost there, stay creative...",
                "Senternet Hub Ready."
            ];

            let count = 0;
            const msgInterval = setInterval(() => {
                if(count < msgs.length) {
                    msg.innerText = msgs[count++];
                }
            }, 2000); // 2s * 5 msgs = 10s

            // 3. Final Transition
            setTimeout(() => {
                clearInterval(msgInterval);
                stage.style.transform = 'translateY(-100%)';
                stage.style.opacity = '0';
                
                setTimeout(() => stage.remove(), 1200);
            }, 10500); // Wait slightly over 10s
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        for(let i=0; i<50; i++) particles.push(new Spark());
        animate();
        runIntroSequence();
    </script>
</body>
</html>
