    <style>
        :root {
            --neon-green: #10b981;
            --tech-blue: #0ea5e9;
            --dark-surface: #0f172a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- 10-SECOND ULTRA INTRO --- */
        #intro-stage {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* Animated Background Particles */
        .bg-elements {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
            animation: moveOrb 20s infinite alternate;
        }

        @keyframes moveOrb {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        /* Logo Animation */
        .logo-container {
            position: relative;
            z-index: 10;
            width: 160px;
            height: 160px;
            margin-bottom: 2rem;
        }

        .logo-ring {
            position: absolute;
            inset: 0;
            border: 2px dashed var(--neon-green);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        .logo-core {
            position: absolute;
            inset: 15px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 25% 75% 30% 70% / 60% 30% 70% 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.2);
            animation: morph 8s ease-in-out infinite alternate;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes morph {
            0% { border-radius: 25% 75% 30% 70% / 60% 30% 70% 40%; }
            100% { border-radius: 70% 30% 75% 25% / 40% 70% 30% 60%; }
        }

        /* Brand Typography */
        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #059669 0%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: reveal 0.8s forwards 0.3s;
        }

        .service-pulse {
            height: 24px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: #64748b;
            margin-top: 10px;
            overflow: hidden;
        }

        /* Loading UI */
        .loader-box {
            margin-top: 3.5rem;
            width: 280px;
            z-index: 10;
        }

        .track {
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .bar {
            position: absolute;
            left: 0; top: 0; height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-green), var(--tech-blue));
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
            transition: width 10s linear; /* Sync with 10s load */
        }

        .details {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
        }

        /* --- INSTALL APP CALLOUT --- */
        #pwa-install {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }

        #pwa-install.visible { transform: translateX(-50%) translateY(0); }

        /* --- APP WRAPPER --- */
        #app-viewport {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Intro Stage -->
    <div id="intro-stage">
        <div class="bg-elements">
            <div class="orb w-96 h-96 bg-emerald-200 top-0 left-0"></div>
            <div class="orb w-80 h-80 bg-sky-200 bottom-0 right-0"></div>
        </div>

        <div class="logo-container">
            <div class="logo-ring"></div>
            <div class="logo-core">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>

        <h1 class="brand-name">SENTERNET</h1>
        
        <div class="service-pulse" id="pulse-text">Creative Solutions</div>

        <div class="loader-box">
            <div class="track">
                <div class="bar" id="load-bar"></div>
            </div>
            <div class="details">
                <span id="status-label">Initializing Core</span>
                <span id="percent-label">0%</span>
            </div>
        </div>
    </div>

    <!-- PWA Install Popup -->
    <div id="pwa-install">
        <div class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center text-white font-bold">S</div>
        <div class="text-sm font-bold text-slate-700">Install Senternet App</div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </div>

    <!-- Background Iframe -->
    <div id="app-viewport">
        <iframe src="https://script.google.com/macros/s/AKfycbwB9aFIBRR1Hdr1YwPfQspjNPd32zSDra80EXg70X2zfX1aNZN3vsFwIIB4RV3_gpWaAw/exec"></iframe>
    </div>

    <script>
        // PWA Installation
        let deferredPrompt;
        const installPopup = document.getElementById('pwa-install');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => installPopup.classList.add('visible'), 3000);
        });

        installPopup.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installPopup.classList.remove('visible');
                deferredPrompt = null;
            }
        });

        // 10-Second Intro Controller
        function runIntro() {
            const bar = document.getElementById('load-bar');
            const percent = document.getElementById('percent-label');
            const status = document.getElementById('status-label');
            const pulse = document.getElementById('pulse-text');
            const intro = document.getElementById('intro-stage');
            const viewport = document.getElementById('app-viewport');

            const services = ["Web Design", "UI/UX Development", "SEO Optimization", "Digital Marketing", "Ready to Launch"];
            const steps = ["Securing Connection", "Loading Assets", "Fetching Database", "Finalizing UI", "Welcome To Senternet Technologies"];

            // Start 10s animation
            bar.style.width = '100%';
            
            let count = 0;
            const sequence = setInterval(() => {
                count++;
                
                // Update percentage
                percent.innerText = (count * 10) + '%';
                
                // Update Pulse & Status
                if(count < 5) {
                    pulse.innerText = services[count];
                    status.innerText = steps[count];
                    pulse.style.animation = 'none';
                    void pulse.offsetWidth; // trigger reflow
                    pulse.style.animation = 'fadeUp 0.5s forwards';
                }

                if(count === 10) {
                    clearInterval(sequence);
                    finish();
                }
            }, 1000); // Update every 1s for 10s total

            function finish() {
                setTimeout(() => {
                    intro.style.transform = 'translateY(-100%)';
                    viewport.style.opacity = '1';
                    
                    setTimeout(() => {
                        intro.remove();
                        // Show install prompt again if they missed it
                        if(deferredPrompt) installPopup.classList.add('visible');
                    }, 1200);
                }, 500);
            }
        }

        window.onload = runIntro;
    </script>
</body>
