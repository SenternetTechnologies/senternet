<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTERNET | Premium AI Intro</title>
    
    <!-- GSAP & Plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>⚡</text></svg>">

    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-green: #10b981;
            --brand-violet: #8b5cf6;
            --bg-white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg-white);
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        #intro-stage {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: radial-gradient(circle at center, #f8fafc 0%, #ffffff 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .canvas-area {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- THE WRITING SVG --- */
        #writing-svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        .text-path {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            visibility: hidden;
            /* Gradient applied via JS/Defs */
        }

        /* --- STYLISH ROBOT HAND --- */
        #robot-hand-container {
            position: absolute;
            width: 140px;
            height: 140px;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: none;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        /* HUD STYLES - BRIGHT THEME */
        .tech-hud {
            position: absolute;
            bottom: 60px;
            text-align: center;
            color: #64748b;
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .progress-bar-wrap {
            width: 240px;
            height: 4px;
            background: #f1f5f9;
            border-radius: 10px;
            margin: 15px auto;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        #hud-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--brand-blue), var(--brand-violet));
            transition: width 0.1s linear;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            opacity: 0.5;
        }

        #main-content { position: fixed; inset: 0; z-index: 1; opacity: 0; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="intro-stage">
        <div class="grid-bg"></div>
        
        <div class="canvas-area">
            <div id="robot-hand-container">
                <svg width="140" height="140" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="handGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <!-- Metallic Arm -->
                    <rect x="35" y="75" width="30" height="35" rx="4" fill="url(#handGrad)" stroke="#94a3b8" stroke-width="1.5" />
                    <!-- Hand Body -->
                    <path d="M30 45 Q30 35 50 35 Q70 35 70 45 L75 75 Q75 80 70 80 L30 80 Q25 80 25 75 Z" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
                    <!-- Joint Details -->
                    <circle cx="50" cy="55" r="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" />
                    <!-- Pen / Stylus -->
                    <rect x="42" y="5" width="5" height="55" rx="2" fill="#1e293b" transform="rotate(-10, 45, 30)" />
                    <!-- Pen Tip Glow -->
                    <circle cx="38" cy="8" r="3" fill="#8b5cf6">
                        <animate attributeName="fill" values="#8b5cf6;#10b981;#2563eb;#8b5cf6" dur="3s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>

            <svg id="writing-svg" viewBox="0 0 1000 250">
                <defs>
                    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#2563eb" />
                        <stop offset="33%" style="stop-color:#10b981" />
                        <stop offset="66%" style="stop-color:#8b5cf6" />
                        <stop offset="100%" style="stop-color:#2563eb" />
                    </linearGradient>
                </defs>
                <!-- FIXED SPELLING: S-E-N-T-E-R-N-E-T -->
                <path id="senternet-path" class="text-path" stroke="url(#textGrad)" 
                d="M50,150 C50,90 110,90 110,120 C110,150 50,150 50,180 C50,210 110,210 110,210 
                   M140,210 V110 H190 M140,160 H180 M140,210 H190 
                   M220,210 V110 L280,210 V110 
                   M310,110 H390 M350,110 V210 
                   M420,210 V110 H470 M420,160 H460 M420,210 H470 
                   M500,210 V110 L560,160 C570,170 570,200 560,210 
                   M500,160 H540 
                   M600,210 V110 L660,210 V110 
                   M690,210 V110 H740 M690,160 H730 M690,210 H740 
                   M770,110 H850 M810,110 V210" />
            </svg>
        </div>

        <div class="tech-hud">
            <span id="status-label">CRAFTING YOUR EXPERIENCE</span>
            <div class="progress-bar-wrap">
                <div id="hud-progress"></div>
            </div>
            <span id="progress-percent">0%</span>
        </div>
    </div>

    <div id="main-content">
        <iframe 
            id="appIframe"
            src="https://script.google.com/macros/s/AKfycbwB9aFIBRR1Hdr1YwPfQspjNPd32zSDra80EXg70X2zfX1aNZN3vsFwIIB4RV3_gpWaAw/exec" 
            loading="eager">
        </iframe>
    </div>

    <script>
        gsap.registerPlugin(MotionPathPlugin);

        function startBrightIntro() {
            const path = document.querySelector('#senternet-path');
            const hand = document.querySelector('#robot-hand-container');
            const stage = document.querySelector('#intro-stage');
            const mainContent = document.querySelector('#main-content');
            const progressTxt = document.querySelector('#progress-percent');
            const hudProgress = document.querySelector('#hud-progress');

            const pathLength = path.getTotalLength();
            gsap.set(path, { 
                strokeDasharray: pathLength, 
                strokeDashoffset: pathLength,
                visibility: 'visible' 
            });
            
            gsap.set(hand, { display: 'block', opacity: 0 });

            const tl = gsap.timeline();

            // 1. Hand Fade In
            tl.to(hand, { duration: 0.8, opacity: 1, ease: "power2.out" });

            // 2. Writing (8 seconds for elegance)
            tl.to(path, {
                strokeDashoffset: 0,
                duration: 8,
                ease: "none",
                onUpdate: function() {
                    const p = Math.round(this.progress() * 100);
                    progressTxt.innerText = p + "%";
                    hudProgress.style.width = p + "%";
                }
            });

            // 3. Hand Path Follow
            tl.to(hand, {
                duration: 8,
                ease: "none",
                motionPath: {
                    path: "#senternet-path",
                    align: "#senternet-path",
                    autoRotate: false,
                    alignOrigin: [0.38, 0.08] // Precision tip alignment
                }
            }, "<");

            // 4. Elegant Clean Exit
            tl.to(hand, { duration: 0.6, opacity: 0, y: -20, ease: "power2.in" });
            tl.to(path, { duration: 1, strokeWidth: 12, opacity: 0, filter: "blur(10px)", ease: "power2.out" });
            
            tl.add(() => {
                gsap.to(mainContent, { duration: 1, opacity: 1 });
                gsap.to(stage, {
                    duration: 1.2,
                    y: "-100%",
                    ease: "expo.inOut",
                    onComplete: () => stage.remove()
                });
            });
        }

        window.onload = startBrightIntro;
    </script>
</body>
</html>
