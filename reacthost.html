<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senternet Technologies | App Hosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://rebrand.ly/senternet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            overflow: hidden;
            background: #0f172a;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .iframe-container {
            height: calc(100vh - 64px);
            width: 100%;
            position: relative;
            background: #ffffff;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            z-index: 50;
            transition: opacity 0.5s ease;
        }

        .pulse-logo {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .sidebar-active #sidebar {
            transform: translateX(0);
        }

        .glass-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="gradient-bg text-white">

    <!-- App Container -->
    <main class="iframe-container">
        <!-- Loader -->
        <div id="loader" class="loader-overlay">
            <div class="text-center">
                <div class="w-16 h-16 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                <p class="text-slate-400 text-sm animate-pulse">Launching Web App...</p>
            </div>
        </div>

        <iframe 
            id="app-iframe"
            src="https://script.google.com/macros/s/AKfycbzluuAH8lvit2a8SoqzRdp3IGYQqEQ0nd7pQTVdQFT5tbheG7cb2szbdeiMqoVElGXpdg/exec" 
            class="w-full h-full border-none"
            allow="camera; microphone; geolocation; clipboard-read; clipboard-write"
            onload="hideLoader()">
        </iframe>
    </main>

    <!-- Mobile Sidebar -->
    <div id="sidebar" class="fixed inset-y-0 right-0 w-64 bg-slate-900 z-50 transform translate-x-full transition-transform duration-300 ease-in-out border-l border-slate-800 p-6 flex flex-col justify-between">
        <div>
            <div class="flex justify-between items-center mb-8">
                <span class="font-bold">Menu</span>
                <button onclick="toggleSidebar()" class="text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <a href="https://rebrand.ly/senternet" target="_blank" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-colors">
                    <i class="fas fa-globe text-blue-500"></i> Website
                </a>
                <a href="https://www.youtube.com/@senternet-technologies" target="_blank" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-colors">
                    <i class="fab fa-youtube text-red-500"></i> YouTube
                </a>
                <a href="https://instagram.com/senternet" target="_blank" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-colors">
                    <i class="fab fa-instagram text-pink-500"></i> Instagram
                </a>
            </div>
        </div>
        
        <div class="border-t border-slate-800 pt-6">
            <p class="text-xs text-slate-500 mb-2">Developed by</p>
            <p class="text-sm font-bold">SENTERNET TECHNOLOGIES</p>
            <p class="text-[10px] text-slate-400">Aranthangi, Pudukkottai</p>
        </div>
    </div>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-active');
            const sidebar = document.getElementById('sidebar');
            if (sidebar.style.transform === 'translateX(0px)') {
                sidebar.style.transform = 'translateX(100%)';
            } else {
                sidebar.style.transform = 'translateX(0)';
            }
        }

        // Safety timeout for loader
        setTimeout(() => {
            const loader = document.getElementById('loader');
            if (loader.style.display !== 'none') {
                hideLoader();
            }
        }, 5000);
    </script>
</body>
</html>
